name: Build and Deploy React

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 1. Actions 自体を Node.js 24 で動かすための先行フラグ
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        # v4 のままでも env 設定により Node 24 上で動作しますが、
        # 今後 v5 等が出た際はそちらへ更新を検討してください
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 2. React のビルド環境も最新の LTS（v22）か v24 に更新
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to Lolipop via SCP
        # 3. サードパーティ製のアクションも Node バージョンに依存するため、
        # master よりもタグ（v0.1.1 など）固定の方が動作が安定します
        uses: appleboy/scp-action@v0.1.7 
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "dist/*"
          target: "/home/users/0/main.jp-web-server/web/rising/frontend/"
          strip_components: 1